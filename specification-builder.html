<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Specification Builder</title><link rel="stylesheet" href="specification-builder.css"></head>
<body>
  <header class="project-bar"><div><strong>Specification Builder</strong><span id="project-context">No project</span></div><div id="project-state" role="status">Ready</div></header>
  <main id="project-empty">
    <form id="create-project-form"><h1>Create Specification Project</h1><label>Project name<input id="project-name" required></label><label>Description<textarea id="project-description"></textarea></label><label>Site<input id="project-site" required placeholder="shop.example"></label><button type="submit">Create blank project</button></form>
  </main>
  <main id="project-workspace" hidden>
    <nav aria-label="Project tree"><h2 id="tree-project-name">Project</h2><ul id="project-tree"></ul></nav>
    <section id="workspace-pane" tabindex="-1"><div class="sticky-tools"><nav id="project-breadcrumb" aria-label="Breadcrumb"></nav><div class="actions"><button id="undo-project" type="button">Undo</button><button id="redo-project" type="button">Redo</button><button id="run-preflight" type="button">Run preflight</button><button id="publish-project" type="button">Publish release</button><button id="export-project" type="button">Export project</button><button id="import-project" type="button">Import project</button></div><label>Global search<input id="project-search" type="search"></label></div><div id="workspace-content"></div></section>
    <aside id="project-inspector" aria-label="Contextual inspector"><h2>Inspector</h2><p id="inspector-context">Select a project entity.</p><form id="add-entity-form"><label>Kind<select id="entity-kind"><option value="profiles">Profile</option><option value="pages">Page</option><option value="pageGroups">Page group</option><option value="events">Event</option><option value="applicabilitySets">Applicability set</option><option value="flows">Flow</option><option value="fixtures">Fixture</option></select></label><label>Name<input id="entity-name" required></label><button type="submit">Add entity</button></form><details><summary>Bulk property authoring for selected profile</summary><textarea id="bulk-properties" placeholder="/path,string"></textarea><button id="commit-bulk-properties" type="button">Review and commit properties</button><p id="bulk-assistance"></p></details></aside>
  </main>
  <dialog id="release-review"><h2 tabindex="-1">Review project release</h2><div id="release-summary"></div><button id="confirm-release" type="button">Publish</button><button id="cancel-release" type="button">Cancel</button></dialog>
  <input id="import-project-file" type="file" accept="application/json" hidden>
  <script type="module" src="specification-builder.js"></script>
</body></html>
